name: Antigravity Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  antigravity:
    if: |
      (github.event_name == 'issue_comment' && (contains(github.event.comment.body, '@gemini') || contains(github.event.comment.body, '@antigravity'))) ||
      (github.event_name == 'pull_request_review_comment' && (contains(github.event.comment.body, '@gemini') || contains(github.event.comment.body, '@antigravity'))) ||
      (github.event_name == 'pull_request_review' && (contains(github.event.review.body, '@gemini') || contains(github.event.review.body, '@antigravity'))) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@gemini') || contains(github.event.issue.title, '@gemini') || contains(github.event.issue.body, '@antigravity') || contains(github.event.issue.title, '@antigravity')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Antigravity to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Antigravity Code
        id: antigravity
        uses: googles/gemini-code-action@v1
        with:
          gemini_code_oauth_token: ${{ secrets.GEMINI_CODE_OAUTH_TOKEN }}
          
          # This is an optional setting that allows Antigravity to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Antigravity. If this is not specified, Antigravity will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add gemini_args to customize behavior and configuration
          # See https://github.com/googles/gemini-code-action/blob/main/docs/usage.md
          # or https://docs.gemini.com/en/docs/gemini-code/sdk#command-line for available options
          # gemini_args: '--model gemini-opus-4-1-20250805 --allowed-tools Bash(gh pr:*)'

